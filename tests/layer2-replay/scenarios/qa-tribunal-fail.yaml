name: qa-tribunal-fail
description: >
  Same flow as qa-tribunal-pass but judge-dredd emits QA_FAIL. Engine
  should still shut down QA agents and relay QA_VERDICT with FAIL.
engine-version: pre-centralization
events-inline:
  - {sender: krs-one, signal: MILESTONE_QA_READY, recipient: team-lead, payload: "M1", timestamp: "00:00:01"}
  - {sender: ken, signal: QA_REPORT_READY, recipient: team-lead, payload: "report at .kiln/tmp/qa-report-red-r1.md", timestamp: "00:00:30"}
  - {sender: ryu, signal: QA_REPORT_READY, recipient: team-lead, payload: "report at .kiln/tmp/qa-report-blue-r1.md", timestamp: "00:00:45"}
  - {sender: denzel, signal: RECONCILIATION_COMPLETE, recipient: team-lead, payload: "synthesis at .kiln/tmp/qa-reconciliation.md", timestamp: "00:01:30"}
  - {sender: judge-dredd, signal: QA_FAIL, recipient: team-lead, payload: "index.md missing", timestamp: "00:02:00"}
assertions:
  - after-event: "judge-dredd | QA_FAIL"
    expected-decisions:
      - type: send
        recipient: krs-one
        signal: QA_VERDICT
        content-contains: FAIL
