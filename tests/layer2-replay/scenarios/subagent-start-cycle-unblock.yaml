name: subagent-start-cycle-unblock
description: >
  P1 (SubagentStart) — CYCLE_WORKERS unblock is driven by SubagentStart
  hook additionalContext injection. The platform fires SubagentStart after
  each Agent call and before the worker's first PreToolUse; the hook emits
  additionalContext which the engine consumes to unblock CYCLE_WORKERS.
  WORKERS_SPAWNED remains an operator-visible logging signal after readiness.
  Assertions cover: (1) spawn on CYCLE_WORKERS with no readiness fallback,
  (2) per-worker SubagentStart ack decisions (E1 multi-worker race — both
  events arrive before the workers' first PreToolUse), and (3)
  WORKERS_SPAWNED emitted only after both acknowledgements as audit/logging.

  SubagentStart payloads use the platform's native JSON shape
  ({"agent_type": "...", "agent_id": "..."}) for fidelity with the real
  hook input. The per-event assertions on SubagentStart use `strict: true`
  so a single ack cannot satisfy both mario's and luigi's assertions via
  cross-event fallback — the E1 multi-worker race is only proven if each
  spawn produces its own ack.
engine-version: post-centralization
events-inline:
  - {sender: krs-one, signal: CYCLE_WORKERS, recipient: team-lead, payload: "scenario=default, duo_id=mario-luigi, coder_name=mario, reviewer_name=luigi, reason=initial, chunk=proof-1", timestamp: "00:00:01"}
  - {sender: platform, signal: SubagentStart, recipient: engine, payload: '{"agent_type": "mario", "agent_id": "agt-001"}', timestamp: "00:00:02"}
  - {sender: platform, signal: SubagentStart, recipient: engine, payload: '{"agent_type": "luigi", "agent_id": "agt-002"}', timestamp: "00:00:03"}
assertions:
  - after-event: "krs-one | CYCLE_WORKERS"
    expected-decisions:
      - type: spawn
        name: mario
        subagent_type: dial-a-coder
      - type: spawn
        name: luigi
        subagent_type: critical-thinker
  - after-event: "platform | SubagentStart | mario"
    strict: true
    expected-decisions:
      - type: subagent_start_ack
        agent: mario
  - after-event: "platform | SubagentStart | luigi"
    strict: true
    expected-decisions:
      - type: subagent_start_ack
        agent: luigi
      - type: send
        recipient: krs-one
        signal: WORKERS_SPAWNED
