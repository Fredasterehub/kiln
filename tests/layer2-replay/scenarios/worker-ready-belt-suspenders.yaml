name: worker-ready-belt-suspenders
description: >
  Wave 3 (C12) — belt-and-suspenders contract for krs-one's CYCLE_WORKERS
  unblock. Either `WORKERS_SPAWNED` from the engine (canonical ack) OR
  `WORKER_READY` from a freshly-spawned worker (first-wake self-announce
  fallback) must independently unblock the boss. This scenario asserts
  the engine's behaviour on both paths:
    1. CYCLE_WORKERS triggers shutdown + spawn + WORKERS_SPAWNED (canonical).
    2. Each worker then emits WORKER_READY once on wake. The engine logs a
       `worker_announce` decision per announcement — proving the signal is
       observed and routed, not swallowed. In production krs-one treats the
       announce as an optional fallback unblock; the engine stays out of the
       unblock decision itself.
  Any regression that makes the engine intercept, suppress, or reroute
  WORKER_READY would change the worker_announce emission pattern and flag
  here.
engine-version: post-centralization
events-inline:
  - {sender: krs-one, signal: CYCLE_WORKERS, recipient: team-lead, payload: "scenario=default, duo_id=mario-luigi, coder_name=mario, reviewer_name=luigi, reason=initial, chunk=proof-1", timestamp: "00:00:01"}
  - {sender: mario, signal: WORKER_READY, recipient: krs-one, payload: "ready for assignment", timestamp: "00:00:02"}
  - {sender: luigi, signal: WORKER_READY, recipient: krs-one, payload: "ready for assignment", timestamp: "00:00:03"}
assertions:
  - after-event: "krs-one | CYCLE_WORKERS"
    expected-decisions:
      - type: spawn
        name: mario
        subagent_type: dial-a-coder
      - type: spawn
        name: luigi
        subagent_type: critical-thinker
      - type: send
        recipient: krs-one
        signal: WORKERS_SPAWNED
  - after-event: "mario | WORKER_READY"
    expected-decisions:
      - type: worker_announce
        sender: mario
  - after-event: "luigi | WORKER_READY"
    expected-decisions:
      - type: worker_announce
        sender: luigi
