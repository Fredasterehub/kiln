# Kiln model tier policy — Kiln v1.5.0 prompt-alignment pass (2026-04-18).
#
# Source of truth for the per-agent model assignment. The linter
# (tests/layer1-static/lint/consistency.py::check_model_policy) asserts
# every agent's frontmatter matches the entry below.
#
# v1.5.0 changes vs Sprint 3 / v1.4.0 policy:
#   - Opus 4.6 retired. All former tier-O agents migrate to opus 4.7.
#   - Model frontmatter uses bare `opus` / `sonnet` aliases (not pinned
#     `opus-4.6` / `opus-4.7` / `sonnet-4.6`). The validator only accepts
#     primitives: inherit / sonnet / opus / haiku.
#   - Effort field per role cookbook in
#     plugins/kiln/skills/kiln-pipeline/references/opus-47-calibration.md.
#   - lore-keepah demoted to sonnet — mechanical archival, no deep reasoning.
#
# Design principles (operator directives):
#   - Default is sonnet. Majority of agents ride this tier.
#   - Apex reasoning (H): bosses and terminal judges that arbitrate over
#     many state files across many cycles earn xhigh. Claude Code defaults
#     to xhigh on plans — same calibration here.
#   - Mid-effort opus (M): UI builders, planners, facilitators. One-pass
#     synthesis with judgment density above sonnet tier but below xhigh
#     orchestration. Matches UI Builder / Planner / Facilitator cookbooks.
#   - Persistent minds (P): opus + high. Continuity across wakes is the
#     value — higher effort keeps them reading state files rather than
#     reasoning from decayed memory. Below xhigh because the per-wake
#     query is bounded, not cross-cycle arbitration.
#   - QA reviewers (Q): opus + high. 4.7's higher bug recall directly
#     applies — trust the stricter rubric.
#   - Build-step paired reviewers (S): sonnet. First review layer.
#   - CLI wrappers (W): sonnet. External model does the reasoning.
#
# Tiers:
#   H — opus + xhigh. Apex coordination / arbitration across many cycles.
#   M — opus + high. UI / plan / facilitation under bounded uncertainty.
#   P — opus + high. Persistent minds, retrieval-plus-synthesis.
#   Q — opus + high. QA reviewers (long-context read against criteria).
#   S — sonnet. Default. Rubrics, scouts, validators, section collators,
#       mechanical archival, paired reviewers.
#   W — sonnet. Thin CLI wrappers (Codex/GPT does the reasoning).

# ── Tier H ─ apex reasoning, opus + xhigh (5 agents) ──────────────────

bossman:
  tier: H
  model: opus
  effort: xhigh
  # krs-one — build boss. Orchestrates every chunk + QA tribunal + milestone
  # transitions. xhigh preserved per operator override; load is many
  # state files across many cycles.

